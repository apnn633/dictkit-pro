<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="汉语字典词典在线版：现代汉语词典、现代汉语规范词典、王力古汉语字典、规范汉字表手册。支持拼音、字词、页码检索，附阅读/浏览/搜索增强、对比模式、批注笔记、自定义主题与字体。">
  <meta name="keywords" content="汉语词典,汉语字典,词典在线,字词检索,拼音检索,王力古汉语字典,规范汉字表">
  <meta name="author" content="dictkit-pro">
  <meta name="theme-color" content="#ec0015">
  <!-- 发行版默认不索引：本项目不分发词典数据，仅为外壳，避免搜索引擎误收录 -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="copyright" content="源代码 MIT；词典数据版权归相应出版社与编者所有，本站不分发数据">

  <title>汉语字典词典在线版</title>

  <link rel="icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./assets/logos/logo2.png">

  <!-- 预连接远程数据/图片 CDN：本应用须串行加载远程 config → 图片，
       提前完成 DNS/TCP/TLS 握手可显著降低 LCP 与 Speed Index。 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>

  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/theme.css">
  <link rel="stylesheet" href="./src/styles/layout.css">
  <link rel="stylesheet" href="./src/styles/components.css">
  <link rel="stylesheet" href="./src/styles/icons.css">
</head>

<body data-ready="false">

  <header class="app-header">
    <div class="search-container">
      <!-- 词典切换 -->
      <div class="dictionary-selector">
        <div class="dict-selector-container">
          <img id="dictLogo" src="./assets/logos/logo2.png" alt="词典 Logo" class="dict-logo">
          <select id="dictSelector" class="dict-selector" title="选择词典" aria-label="选择词典" data-i18n-title="selectDict" data-i18n-aria-label="selectDict"></select>
        </div>
      </div>

      <!-- 搜索输入 -->
      <div class="search-input-container">
        <input type="text" class="search-input" id="searchInput"
          placeholder="拼音、字词或页码……" autocomplete="off" aria-label="搜索" data-i18n-placeholder="searchPlaceholder" />
        <div class="search-suggestions" id="searchSuggestions" role="listbox"></div>
      </div>

      <!-- 搜索过滤 -->
      <div class="search-filter" id="searchFilter" title="搜索范围">
        <button class="filter-chip active" data-filter="all" data-i18n="filterAll">全部</button>
        <button class="filter-chip" data-filter="pinyin" data-i18n="filterPinyin">拼音</button>
        <button class="filter-chip" data-filter="chars" data-i18n="filterChars">单字</button>
        <button class="filter-chip" data-filter="words" data-i18n="filterWords">词语</button>
      </div>

      <!-- 功能按钮组 -->
      <div class="search-buttons">
        <div class="settings-wrapper">
          <button class="action-btn" id="settingsToggle" title="设置" aria-expanded="false" aria-controls="settingsPanel" data-i18n-title="settings">
            <span class="icon icon-settings" aria-hidden="true"></span>
          </button>
          <div class="settings-panel" id="settingsPanel"></div>
        </div>

        <button class="action-btn" id="notesToggle" title="批注笔记" data-i18n-title="notes">
          <span class="icon icon-info" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="historyToggle" title="历史记录" data-i18n-title="history">
          <span class="icon icon-history" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="bookmarkToggle" title="书签收藏" data-i18n-title="bookmarks">
          <span class="icon icon-bookmark" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="compareToggle" title="对比模式" data-i18n-title="compare">
          <span class="icon icon-compare" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="fullscreenBtn" title="全屏模式" data-i18n-title="fullscreen">
          <span class="icon icon-fullscreen" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="tipToggle" title="拼音提示" data-i18n-title="pinyinTip">
          <span class="icon icon-info" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="sidebarToggle" title="词典目录" data-i18n-title="toc">
          <span class="icon icon-list" aria-hidden="true"></span>
        </button>

        <button class="action-btn" id="langToggle" title="语言 / Language" data-i18n-title="langToggle">
          <span class="icon icon-globe" aria-hidden="true"></span>
        </button>

        <button class="search-btn" id="searchBtn" title="搜索" data-i18n-title="search" data-i18n-aria-label="search">
          <span class="icon icon-search" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <div id="searchResult" class="search-result" role="status"></div>
  </header>

  <!-- 拼音声调提示弹窗 -->
  <div class="popup-overlay" id="pinyinPopup" role="dialog" aria-modal="true" aria-labelledby="pinyinPopupTitle">
    <div class="popup-content">
      <div class="popup-header">
        <h3 id="pinyinPopupTitle" data-i18n="pinyinTip">提示</h3>
        <button class="close-popup" id="closePopup" aria-label="关闭" data-i18n-aria-label="close">&times;</button>
      </div>
      <div class="search-tip" id="pinyinTipContent"></div>
    </div>
  </div>

  <!-- 词典目录侧栏 -->
  <aside class="sidebar" id="sidebarPopup" role="dialog" aria-modal="false" aria-labelledby="tocTitle">
    <div class="sidebar-header">
      <h3 id="tocTitle" data-i18n="tocTitle">词典简明目录</h3>
      <button class="close-popup" id="closeSidebarPopup" aria-label="关闭" data-i18n-aria-label="close">&times;</button>
    </div>
    <div class="sidebar-content" id="bookmarksList"></div>
  </aside>

  <!-- 历史记录侧栏 -->
  <aside class="sidebar sidebar-right" id="historyPanel" role="dialog" aria-modal="false" aria-labelledby="historyTitle">
    <div class="sidebar-header">
      <h3 id="historyTitle" data-i18n="historyTitle">阅读历史</h3>
      <div class="sidebar-header-actions">
        <button class="text-btn" id="exportHistory" title="导出" data-i18n="export" data-i18n-title="export">导出</button>
        <button class="text-btn" id="clearHistory" title="清空" data-i18n="clear" data-i18n-title="clear">清空</button>
        <button class="close-popup" id="closeHistory" aria-label="关闭" data-i18n-aria-label="close">&times;</button>
      </div>
    </div>
    <div class="sidebar-content" id="historyList"></div>
  </aside>

  <!-- 书签侧栏 -->
  <aside class="sidebar sidebar-right" id="bookmarkPanel" role="dialog" aria-modal="false" aria-labelledby="bookmarkTitle">
    <div class="sidebar-header">
      <h3 id="bookmarkTitle" data-i18n="bookmarkTitle">我的书签</h3>
      <div class="sidebar-header-actions">
        <button class="text-btn" id="addBookmark" title="收藏当前页" data-i18n="addBookmark">+ 收藏</button>
        <button class="text-btn" id="exportBookmarks" title="导出书签" data-i18n="export" data-i18n-title="export">导出</button>
        <button class="close-popup" id="closeBookmark" aria-label="关闭" data-i18n-aria-label="close">&times;</button>
      </div>
    </div>
    <div class="sidebar-content" id="bookmarkList"></div>
  </aside>

  <!-- 批注笔记侧栏 -->
  <aside class="sidebar sidebar-right" id="notesPanel" role="dialog" aria-modal="false" aria-labelledby="notesTitle">
    <div class="sidebar-header">
      <h3 id="notesTitle" data-i18n="notesTitle">批注笔记</h3>
      <div class="sidebar-header-actions">
        <button class="text-btn" id="addNote" title="为当前页添加笔记" data-i18n="addNote">+ 笔记</button>
        <button class="text-btn" id="exportNotes" title="导出笔记" data-i18n="export" data-i18n-title="export">导出</button>
        <button class="close-popup" id="closeNotes" aria-label="关闭" data-i18n-aria-label="close">&times;</button>
      </div>
    </div>
    <div class="sidebar-content" id="notesList"></div>
  </aside>

  <!-- 缩略图导航条 -->
  <div class="thumbnail-bar" id="thumbnailBar" role="region" aria-label="缩略图导航">
    <button class="thumb-toggle" id="thumbToggle" title="缩略图导航" data-i18n-title="thumbToggle">
      <span class="icon icon-grid" aria-hidden="true"></span>
    </button>
    <div class="thumbnail-track" id="thumbnailTrack"></div>
  </div>

  <!-- 阅读进度条 -->
  <div class="reading-progress" id="readingProgress" aria-hidden="true">
    <div class="reading-progress-bar" id="readingProgressBar"></div>
  </div>

  <!-- 主查看区 -->
  <main class="result-container" id="resultContainer">
    <div class="viewer-frame" id="viewerFrame">
      <img id="mainImage" alt="词典页面" src="./assets/0001.png" width="647" height="955" class="img-placeholder">
      <img id="mainImage2" alt="词典页面对页" class="spread-image img-placeholder" src="" width="647" height="955">
      <img id="compareImage" alt="对比词典页面" class="compare-image img-placeholder" src="" width="647" height="955">
    </div>

    <!-- Nav arrows live OUTSIDE the scrollable .viewer-frame so they stay
         pinned to the viewport edges regardless of zoom/scroll position. -->
    <div id="prevBtn" class="nav-arrow" role="button" aria-label="上一页" tabindex="0" data-i18n-aria-label="prev">
      <span class="icon icon-arrow-left" aria-hidden="true"></span>
    </div>
    <div id="nextBtn" class="nav-arrow" role="button" aria-label="下一页" tabindex="0" data-i18n-aria-label="next">
      <span class="icon icon-arrow-right" aria-hidden="true"></span>
    </div>

    <div class="viewer-toolbar">
      <button class="tool-btn" id="zoomOut" title="缩小 (-)" aria-label="缩小" data-i18n-title="zoomOut" data-i18n-aria-label="zoomOut">
        <span class="icon icon-zoom-out" aria-hidden="true"></span>
      </button>
      <span class="zoom-display" id="zoomDisplay">100%</span>
      <button class="tool-btn" id="zoomIn" title="放大 (+)" aria-label="放大" data-i18n-title="zoomIn" data-i18n-aria-label="zoomIn">
        <span class="icon icon-zoom-in" aria-hidden="true"></span>
      </button>
      <button class="tool-btn" id="zoomReset" title="重置缩放 (0)" aria-label="重置" data-i18n-title="reset" data-i18n-aria-label="reset">1:1</button>
      <button class="tool-btn" id="fitWidth" title="适合宽度" aria-label="适合宽度" aria-pressed="false" data-i18n-title="fitWidth" data-i18n-aria-label="fitWidth">W</button>
      <button class="tool-btn" id="rotateBtn" title="旋转 (R)" aria-label="旋转" data-i18n-title="rotate" data-i18n-aria-label="rotate">
        <span class="icon icon-rotate" aria-hidden="true"></span>
      </button>
    </div>

    <div id="pageIndicator" class="page-indicator"></div>
  </main>

  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay" hidden>
    <div class="spinner" aria-hidden="true"></div>
    <p data-i18n="loading">加载中……</p>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- 免责声明页脚 -->
  <footer class="legal-footer" role="contentinfo">
    <span data-i18n="disclaimer">本工具仅为阅读外壳，不存储/不分发词典数据，版权归相应出版社与编者所有；仅供个人学习研究。</span>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
